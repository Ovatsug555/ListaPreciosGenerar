<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Precios</title>
    <link rel="icon" href="camisa.png" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <img class="header__logo" src="Logo Generar Misiones.jpeg" alt="Logo Pampero Generar Misiones">
    </header>

    <div class="buscador-wrapper">
        <label for="codigo">Ingrese código o nombre de la prenda:</label>
        
        <div class="input-group">
            <input type="text" id="codigo" placeholder="Ej: 111138003 o Chomba..." autocomplete="off">
            <button onclick="buscarPrecio()">Buscar</button>
            <ul id="sugerencias" class="sugerencias-lista"></ul>
        </div>

        <div id="resultado"></div>
    </div>

    <script src="codigo.js"></script>
</body>
</html>
